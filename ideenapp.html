    /* System fonts – no external requests */

  <style>
    :root {
      --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c27;
      --border:rgba(255,255,255,0.07); --accent:#6db870; --accent2:#7c6aff;

      --safe:env(safe-area-inset-bottom,0px);

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    /* HEADER */
    header{padding:60px 24px 12px;padding-top:max(60px,calc(env(safe-area-inset-top) + 20px))}
    .header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .app-title{font-family:Palatino,'Palatino Linotype','Book Antiqua',serif;font-size:40px;font-weight:700;line-height:1;color:var(--accent)}
    .idea-count{font-size:13px;color:var(--muted);font-weight:300;margin-top:6px;letter-spacing:.05em}
    .hbtns{display:flex;gap:8px}
    .hbtn{background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:18px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
    .hbtn:active{color:var(--accent);border-color:rgba(109,184,112,.3)}

    /* STREAK */


    /* TABS */
    .tabs{display:flex;gap:6px;padding:0 24px 14px;overflow-x:auto;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:6px 11px;border-radius:20px;font-size:12px;white-space:nowrap;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
    .tab.active{background:var(--accent);color:#0a0a0f;border-color:var(--accent);font-weight:500}

    /* SEARCH */
    .search-wrap{padding:0 24px 16px}
    .search-box{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;gap:10px}
    .search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:15px}
    .search-box input::placeholder{color:var(--muted)}

    /* CARDS */
    .list{flex:1;padding:0 24px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;overflow-x:hidden;padding-bottom:140px;-ms-overflow-style:none;scrollbar-width:none;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .list::-webkit-scrollbar{display:none}

    .idea-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px 18px;cursor:pointer;transition:transform .2s ease;position:relative;overflow:hidden;animation:slideIn .3s ease forwards;user-select:none;touch-action:pan-y}
    @keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .idea-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
    .cat-allgemein::before{background:var(--accent)}
    .cat-arbeit::before{background:var(--accent2)}
    .cat-kreativ::before{background:#ff9f7f}
    .cat-persönlich::before{background:var(--ok)}
    .idea-card:active{transform:scale(.98)}

    .card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .card-cat{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.06)}
    .card-date{font-size:12px;color:var(--muted)}
    .card-text{font-size:15px;line-height:1.5;color:var(--text);font-weight:300}
    .card-thumb{width:100%;height:90px;object-fit:cover;border-radius:10px;margin-top:10px;display:block}
    .card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    .card-status{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
    .sdot{width:7px;height:7px;border-radius:50%}
    .s-Neu .sdot{background:var(--accent2)}
    .s-InBearbeitung .sdot{background:var(--accent)}
    .s-Umgesetzt .sdot{background:var(--ok)}
    .s-Verworfen .sdot{background:var(--danger);opacity:.6}
    .card-badges{display:flex;gap:5px;font-size:13px}
    .rem-tag{font-size:11px;color:var(--accent);background:rgba(109,184,112,.1);border:1px solid rgba(109,184,112,.2);border-radius:6px;padding:2px 7px;margin-top:8px;display:inline-block}

    /* EMPTY */
    .empty{text-align:center;padding:60px 40px;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
    .empty p{font-family:Palatino,'Palatino Linotype','Book Antiqua',serif;font-style:italic;font-size:18px;line-height:1.5}

    /* FAB */
    .fab{position:fixed;bottom:calc(28px + var(--safe));left:50%;transform:translateX(-50%);background:var(--accent);color:#0a0a0f;border:none;border-radius:50px;padding:16px 32px;font-size:15px;font-weight:500;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(109,184,112,.35);transition:all .2s;z-index:100;white-space:nowrap}
    .fab:active{transform:translateX(-50%) scale(.96)}

    /* MODALS */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s}
    .overlay.open{opacity:1;pointer-events:all}
    .sheet{background:var(--surface);border:1px solid var(--border);border-radius:28px 28px 0 0;padding:28px 24px;padding-bottom:calc(28px + var(--safe));width:100%;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .overlay.open .sheet{transform:translateY(0)}
    .handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px}
    .sheet-title{font-family:Palatino,'Palatino Linotype','Book Antiqua',serif;font-size:22px;margin-bottom:20px}

    /* form */
    .sheet textarea,.sheet input[type=text],.sheet input[type=datetime-local]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:15px;font-weight:300;line-height:1.6;outline:none;transition:border-color .2s}
    .sheet textarea{resize:none;min-height:110px}
    .sheet textarea:focus,.sheet input:focus{border-color:rgba(109,184,112,.4)}
    .sheet textarea::placeholder,.sheet input::placeholder{color:var(--muted)}
    .sheet input[type=datetime-local]{color-scheme:dark}
    .irow{display:flex;gap:10px;align-items:flex-end}
    .irow .twrap{flex:1}
    .flabel{font-size:11px;color:var(--muted);margin-bottom:8px;display:block;letter-spacing:.06em;text-transform:uppercase}
    .fgroup{margin-top:16px}

    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:7px 14px;border-radius:12px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
    .chip.on{border-color:var(--accent);color:var(--accent);background:rgba(109,184,112,.1)}

    .mic-btn{width:50px;height:50px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;position:relative;overflow:hidden}
    .mic-btn.rec{background:rgba(255,107,107,.15);border-color:rgba(255,107,107,.4);color:var(--danger)}
    .mic-btn.rec::before{content:'';position:absolute;inset:0;background:rgba(255,107,107,.08);animation:mp 1s ease-in-out infinite}
    @keyframes mp{0%,100%{opacity:0;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}

    .img-area{border:1.5px dashed var(--border);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
    .img-area:hover{border-color:rgba(109,184,112,.4)}
    .img-prev{width:100%;border-radius:10px;margin-top:10px;display:none}

    .submit{width:100%;margin-top:18px;background:var(--accent);color:#0a0a0f;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:500;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;cursor:pointer;transition:all .2s}
    .submit:active{transform:scale(.98);opacity:.9}

    /* DETAIL */
    .det-img{width:100%;border-radius:14px;margin-bottom:16px;display:none}
    .det-text{font-size:17px;line-height:1.7;font-weight:300;margin-bottom:14px}
    .det-meta{font-size:13px;color:var(--muted);margin-bottom:16px}
    .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0 16px}
    .sbtn{padding:10px 8px;border-radius:12px;font-size:13px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;text-align:center}
    .sbtn.on{border-color:var(--accent);color:var(--accent);background:rgba(109,184,112,.1)}
    .dbtns{display:flex;gap:10px;margin-top:4px}
    .dbtn{flex:1;padding:13px;border-radius:14px;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--surface2);color:var(--muted)}
    .dbtn:active{transform:scale(.97)}
    .dbtn.red{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.2);color:var(--danger)}

    /* EXPORT */
    .exp-list{display:flex;flex-direction:column;gap:10px}
    .exp-btn{display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all .2s;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
    .exp-btn:active{transform:scale(.98);border-color:rgba(109,184,112,.3)}
    .exp-ico{font-size:24px;width:40px;text-align:center}
    .exp-title{font-size:15px;font-weight:500}
    .exp-sub{font-size:12px;color:var(--muted);margin-top:2px}

    /* RANDOM */
    .rand-ov{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;opacity:0;pointer-events:none;transition:opacity .3s;padding:32px}
    .rand-ov.open{opacity:1;pointer-events:all}
    .rand-label{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .rand-text{font-family:Palatino,'Palatino Linotype','Book Antiqua',serif;font-size:26px;text-align:center;line-height:1.5;max-width:320px}
    .rand-date{font-size:13px;color:var(--muted)}
    .rand-close{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:12px 28px;border-radius:50px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;cursor:pointer;margin-top:8px}

    /* VOICE */
    .voice-ov{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;opacity:0;pointer-events:none;transition:opacity .3s}
    .voice-ov.open{opacity:1;pointer-events:all}
    .vlabel{font-family:Palatino,'Palatino Linotype','Book Antiqua',serif;font-size:22px;font-style:italic}
    .vtxt{font-size:18px;font-weight:300;text-align:center;max-width:300px;min-height:60px;line-height:1.6;color:var(--text)}
    .waveform{display:flex;align-items:center;gap:5px;height:60px}
    .wb{width:4px;border-radius:4px;background:var(--accent);animation:wb .8s ease-in-out infinite;height:8px}
    .wb:nth-child(1){animation-delay:0s}.wb:nth-child(2){animation-delay:.1s}.wb:nth-child(3){animation-delay:.2s}
    .wb:nth-child(4){animation-delay:.3s}.wb:nth-child(5){animation-delay:.2s}.wb:nth-child(6){animation-delay:.1s}.wb:nth-child(7){animation-delay:0s}
    .waveform.idle .wb{animation:none;height:8px;opacity:.3}
    @keyframes wb{0%,100%{height:8px;opacity:.4}50%{height:44px;opacity:1}}
    .vstop{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:var(--danger);padding:14px 32px;border-radius:50px;font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;cursor:pointer}
    .vcancel{background:none;border:none;color:var(--muted);font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;cursor:pointer}

    /* TOAST */
    .toast{position:fixed;bottom:calc(100px + var(--safe));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;color:var(--text);white-space:nowrap;opacity:0;transition:all .3s;z-index:500;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .nosup{font-size:12px;color:var(--danger);margin-top:6px;display:none}
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-top">
      <div>
        <div class="app-title">Ideas</div>
        <div class="idea-count" id="ideaCount">Keine Ideen noch</div>
      </div>
      <div class="hbtns">
        <button class="hbtn" onclick="openRandom()" title="Zufällige Idee">🎲</button>
        <button class="hbtn" onclick="openExport()" title="Exportieren">↗️</button>
      </div>
    </div>

  </header>

  <div class="tabs">
    <button class="tab active" onclick="setFilter('alle',this)">Alle</button>
    <button class="tab" onclick="setFilter('fav',this)">⭐ Favoriten</button>
    <button class="tab" onclick="setFilter('allgemein',this)">Allgemein</button>
    <button class="tab" onclick="setFilter('arbeit',this)">Arbeit</button>
    <button class="tab" onclick="setFilter('kreativ',this)">Kreativ</button>
    <button class="tab" onclick="setFilter('persönlich',this)">Persönlich</button>
    <button class="tab" onclick="setFilter('erinnerung',this)">🔔 Erinnerungen</button>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <span style="color:var(--muted)">🔍</span>
      <input type="text" id="searchInput" placeholder="Ideen durchsuchen…" oninput="renderIdeas()">
    </div>
  </div>

  <div class="list" id="list"></div>
  <button class="fab" onclick="openAdd()"><span style="font-size:20px">✦</span> Neue Idee</button>
</div>

<!-- ADD -->
<div class="overlay" id="addOv" onclick="closeOv(event,'addOv')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Neue Idee</div>
    <div class="irow">
      <div class="twrap"><textarea id="newText" placeholder="Was geht dir durch den Kopf?" rows="4"></textarea></div>
      <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎙️</button>
    </div>
    <div class="nosup" id="nosup">Mikrofon nicht erlaubt oder unterstützt.</div>

    <div class="fgroup"><span class="flabel">Kategorie</span>
      <div class="chips" id="catChips">
        <button class="chip on" onclick="pickChip(this,'cat','allgemein')">Allgemein</button>
        <button class="chip" onclick="pickChip(this,'cat','arbeit')">Arbeit</button>
        <button class="chip" onclick="pickChip(this,'cat','kreativ')">Kreativ</button>
        <button class="chip" onclick="pickChip(this,'cat','persönlich')">Persönlich</button>
      </div>
    </div>

    <div class="fgroup"><span class="flabel">Status</span>
      <div class="chips" id="statChips">
        <button class="chip on" onclick="pickChip(this,'stat','Neu')">💡 Neu</button>
        <button class="chip" onclick="pickChip(this,'stat','In Bearbeitung')">⚙️ Läuft</button>
        <button class="chip" onclick="pickChip(this,'stat','Umgesetzt')">✅ Fertig</button>
        <button class="chip" onclick="pickChip(this,'stat','Verworfen')">🗑 Verworfen</button>
      </div>
    </div>

    <div class="fgroup"><span class="flabel">🔔 Erinnerung (optional)</span>
      <input type="datetime-local" id="newReminder">
    </div>

    <div class="fgroup"><span class="flabel">📷 Bild anhängen (optional)</span>
      <div class="img-area" onclick="document.getElementById('imgIn').click()">
        <input type="file" id="imgIn" accept="image/*" onchange="handleImg(event)" style="display:none">
        <span style="font-size:24px">📸</span>
        <p style="font-size:13px;color:var(--muted);margin-top:6px">Foto oder Screenshot auswählen</p>
        <img id="imgPrev" class="img-prev">
      </div>
    </div>

    <button class="submit" onclick="addIdea()">Idee speichern</button>
  </div>
</div>

<!-- DETAIL -->
<div class="overlay" id="detOv" onclick="closeOv(event,'detOv')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="dCat"></div>
    <img id="dImg" class="det-img">
    <div class="det-text" id="dText"></div>
    <div class="det-meta" id="dMeta"></div>
    <div id="dRem" style="display:none;margin-bottom:14px"><span class="rem-tag" id="dRemTag"></span></div>
    <span class="flabel">Status ändern</span>
    <div class="sgrid">
      <button class="sbtn on" onclick="setStatus(this,'Neu')">💡 Neu</button>
      <button class="sbtn" onclick="setStatus(this,'In Bearbeitung')">⚙️ In Bearbeitung</button>
      <button class="sbtn" onclick="setStatus(this,'Umgesetzt')">✅ Umgesetzt</button>
      <button class="sbtn" onclick="setStatus(this,'Verworfen')">🗑 Verworfen</button>
    </div>
    <div class="dbtns">
      <button class="dbtn" id="favBtn" onclick="toggleFav()">☆ Favorit</button>
      <button class="dbtn red" onclick="delIdea()">🗑 Löschen</button>
    </div>
  </div>
</div>

<!-- EXPORT -->
<div class="overlay" id="expOv" onclick="closeOv(event,'expOv')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">Exportieren &amp; Importieren</div>
    <div class="exp-list">
      <button class="exp-btn" onclick="expMd()">
        <span class="exp-ico">📝</span>
        <div><div class="exp-title">Markdown</div><div class="exp-sub">Für Obsidian, Notion, Bear…</div></div>
      </button>
      <button class="exp-btn" onclick="expJSON()">
        <span class="exp-ico">📦</span>
        <div><div class="exp-title">JSON Backup</div><div class="exp-sub">Alle Daten sichern</div></div>
      </button>
      <button class="exp-btn" onclick="expClip()">
        <span class="exp-ico">📋</span>
        <div><div class="exp-title">Text kopieren</div><div class="exp-sub">In die Zwischenablage</div></div>
      </button>
      <button class="exp-btn" onclick="document.getElementById('impIn').click()">
        <span class="exp-ico">📥</span>
        <div><div class="exp-title">Import (JSON)</div><div class="exp-sub">Backup wiederherstellen</div></div>
      </button>
      <input type="file" id="impIn" accept=".json" style="display:none" onchange="doImport(event)">
    </div>
  </div>
</div>

<!-- RANDOM -->
<div class="rand-ov" id="randOv">
  <div class="rand-label">✦ Erinnerst du dich noch?</div>
  <div class="rand-text" id="randText"></div>
  <div class="rand-date" id="randDate"></div>
  <button class="rand-close" onclick="document.getElementById('randOv').classList.remove('open')">Schließen</button>
</div>

<!-- VOICE -->
<div class="voice-ov" id="voiceOv">
  <div class="vlabel">Sprich deine Idee…</div>
  <div class="waveform idle" id="waveform">
    <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
  </div>
  <div class="vtxt" id="vtxt">Warte auf Sprache…</div>
  <button class="vstop" onclick="stopVoice()">⏹ Fertig</button>
  <button class="vcancel" onclick="cancelVoice()">Abbrechen</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
let ideas = [];
try { ideas = JSON.parse(localStorage.getItem('ideenapp_v2')||'[]'); } catch(e){}
let filter='alle', selCat='allgemein', selStat='Neu', newImg=null, detId=null;

const CATS = {allgemein:{l:'Allgemein',c:'#6db870'},arbeit:{l:'Arbeit',c:'#7c6aff'},kreativ:{l:'Kreativ',c:'#ff9f7f'},'persönlich':{l:'Persönlich',c:'#6fd6a7'}};

function save(){ localStorage.setItem('ideenapp_v2',JSON.stringify(ideas)); }



// ── FORMAT ──
function fDate(ts){
  const d=new Date(ts),now=new Date(),diff=now-d;
  if(diff<6e4)return'Gerade eben';
  if(diff<36e5)return Math.floor(diff/6e4)+' Min.';
  if(diff<864e5)return Math.floor(diff/36e5)+' Std.';
  if(diff<6048e5)return Math.floor(diff/864e5)+' Tage';
  return d.toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric'});
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── RENDER ──
function renderIdeas(){
  const el=document.getElementById('list');
  const q=document.getElementById('searchInput').value.toLowerCase();
  const f=ideas.filter(i=>{
    const ms=!q||i.text.toLowerCase().includes(q);
    const mf=filter==='alle'||(filter==='fav'&&i.fav)||(filter==='erinnerung'&&i.reminder)||i.cat===filter;
    return ms&&mf;
  });
  document.getElementById('ideaCount').textContent=ideas.length===0?'Noch keine Ideen':`${ideas.length} Idee${ideas.length!==1?'n':''}`;
  if(!f.length){el.innerHTML=`<div class="empty"><div class="empty-icon">✦</div><p>Keine Ideen hier.<br>Fang an zu träumen.</p></div>`;return;}
  el.innerHTML=f.map(id=>{
    const sc='s-'+(id.status||'Neu').replace(/\s/g,'');
    const rem=id.reminder?`<div><span class="rem-tag">🔔 ${new Date(id.reminder).toLocaleString('de-DE',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span></div>`:'';
    const thumb=id.image?`<img class="card-thumb" src="${id.image}">`:'';
    return`<div class="idea-card cat-${id.cat} ${sc}" onclick="openDet(${id.id})"
      ontouchstart="ts(event,${id.id})" ontouchmove="tm(event,${id.id})" ontouchend="te(event,${id.id})">
      <div class="card-head">
        <span class="card-cat" style="color:${CATS[id.cat]?.c}">${CATS[id.cat]?.l||id.cat}</span>
        <span class="card-date">${fDate(id.ts)}</span>
      </div>
      <div class="card-text">${esc(id.text)}</div>
      ${thumb}${rem}
      <div class="card-foot">
        <div class="card-status"><div class="sdot"></div>${id.status||'Neu'}</div>
        <div class="card-badges">${id.fav?'⭐':''}${id.reminder?'🔔':''}${id.image?'🖼':''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── SWIPE ──
const tSX={};
function ts(e,id){tSX[id]=e.touches[0].clientX;}
function tm(e,id){
  const dx=e.touches[0].clientX-(tSX[id]||0);
  if(dx<-20){e.currentTarget.style.transform=`translateX(${Math.max(dx,-100)}px)`;e.currentTarget.style.transition='none';}
}
function te(e,id){
  const card=e.currentTarget;
  const dx=e.changedTouches[0].clientX-(tSX[id]||0);
  card.style.transition='transform .3s ease';
  card.style.transform='translateX(0)';
  if(dx<-80){
    if(confirm('Idee löschen?')){ideas=ideas.filter(i=>i.id!==id);save();renderIdeas();toast('Idee gelöscht');}
  }
}

// ── FILTER ──
function setFilter(f,el){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderIdeas();}

// ── CHIPS ──
function pickChip(el,type,val){
  el.closest('.chips').querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(type==='cat')selCat=val;
  if(type==='stat')selStat=val;
}

// ── ADD ──
function openAdd(){
  document.getElementById('newText').value='';
  document.getElementById('newReminder').value='';
  document.getElementById('imgPrev').style.display='none';
  newImg=null; selCat='allgemein'; selStat='Neu';
  document.querySelectorAll('#catChips .chip').forEach((b,i)=>b.classList.toggle('on',i===0));
  document.querySelectorAll('#statChips .chip').forEach((b,i)=>b.classList.toggle('on',i===0));
  document.getElementById('addOv').classList.add('open');
  setTimeout(()=>document.getElementById('newText').focus(),400);
}

function handleImg(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=x=>{newImg=x.target.result;const p=document.getElementById('imgPrev');p.src=newImg;p.style.display='block';};
  r.readAsDataURL(f);
}

function addIdea(){
  const text=document.getElementById('newText').value.trim();
  if(!text){toast('Bitte erst etwas eingeben ✍️');return;}
  const remVal=document.getElementById('newReminder').value;
  const reminder=remVal?new Date(remVal).getTime():null;
  const idea={id:Date.now(),text,cat:selCat,ts:Date.now(),fav:false,status:selStat,reminder,image:newImg||null};
  ideas.unshift(idea);
  save();
  if(reminder)scheduleRem(idea);
  document.getElementById('addOv').classList.remove('open');
  renderIdeas();
  toast('Idee gespeichert ✦');
}

// ── REMINDERS ──
function scheduleRem(idea){
  if(!('Notification'in window))return;
  Notification.requestPermission().then(p=>{
    if(p!=='granted')return;
    const d=idea.reminder-Date.now();
    if(d>0)setTimeout(()=>new Notification('Ideen 💡',{body:idea.text.substring(0,80)}),d);
  });
}
ideas.filter(i=>i.reminder&&i.reminder>Date.now()).forEach(scheduleRem);

// ── DETAIL ──
function openDet(id){
  const i=ideas.find(x=>x.id===id);if(!i)return;
  detId=id;
  document.getElementById('dCat').textContent=CATS[i.cat]?.l||i.cat;
  document.getElementById('dText').textContent=i.text;
  document.getElementById('dMeta').textContent=new Date(i.ts).toLocaleString('de-DE',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
  const img=document.getElementById('dImg');
  img.style.display=i.image?'block':'none';if(i.image)img.src=i.image;
  const rd=document.getElementById('dRem');
  if(i.reminder){rd.style.display='block';document.getElementById('dRemTag').textContent='🔔 '+new Date(i.reminder).toLocaleString('de-DE',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
  else rd.style.display='none';
  const sm={'💡 Neu':'Neu','⚙️ In Bearbeitung':'In Bearbeitung','✅ Umgesetzt':'Umgesetzt','🗑 Verworfen':'Verworfen'};
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.toggle('on',sm[b.textContent.trim()]===i.status));
  document.getElementById('favBtn').textContent=i.fav?'⭐ Favorit':'☆ Favorit';
  document.getElementById('detOv').classList.add('open');
}

function setStatus(el,s){
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  const i=ideas.find(x=>x.id===detId);if(i){i.status=s;save();renderIdeas();}
}

function toggleFav(){
  const i=ideas.find(x=>x.id===detId);if(!i)return;
  i.fav=!i.fav;
  document.getElementById('favBtn').textContent=i.fav?'⭐ Favorit':'☆ Favorit';
  save();renderIdeas();
  toast(i.fav?'⭐ Zu Favoriten hinzugefügt':'Aus Favoriten entfernt');
}

function delIdea(){
  if(!confirm('Idee wirklich löschen?'))return;
  ideas=ideas.filter(i=>i.id!==detId);save();
  document.getElementById('detOv').classList.remove('open');
  renderIdeas();toast('Idee gelöscht');
}

// ── RANDOM ──
function openRandom(){
  if(!ideas.length){toast('Noch keine Ideen vorhanden!');return;}
  const i=ideas[Math.floor(Math.random()*ideas.length)];
  document.getElementById('randText').textContent=i.text;
  document.getElementById('randDate').textContent=new Date(i.ts).toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('randOv').classList.add('open');
}

// ── EXPORT ──
function openExport(){document.getElementById('expOv').classList.add('open');}
function dl(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}
function expMd(){
  let md=`# Meine Ideen\n_${new Date().toLocaleDateString('de-DE')}_\n\n`;
  ideas.forEach(i=>{md+=`## ${CATS[i.cat]?.l} — ${new Date(i.ts).toLocaleDateString('de-DE')}\n**Status:** ${i.status||'Neu'}${i.fav?' ⭐':''}\n\n${i.text}\n\n---\n\n`;});
  dl('ideen.md',md,'text/markdown');
  document.getElementById('expOv').classList.remove('open');toast('Markdown exportiert 📝');
}
function expJSON(){
  dl('ideen-backup.json',JSON.stringify(ideas.map(i=>({...i,image:i.image?'[Bild]':null})),null,2),'application/json');
  document.getElementById('expOv').classList.remove('open');toast('Backup gespeichert 📦');
}
function expClip(){
  navigator.clipboard.writeText(ideas.map(i=>`[${CATS[i.cat]?.l}] ${i.text}`).join('\n\n')).then(()=>toast('Kopiert 📋'));
  document.getElementById('expOv').classList.remove('open');
}
function doImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=x=>{
    try{
      const d=JSON.parse(x.target.result);
      if(Array.isArray(d)){ideas=[...d,...ideas];save();renderIdeas();toast(`${d.length} Ideen importiert ✦`);}
      document.getElementById('expOv').classList.remove('open');
    }catch(err){toast('Ungültige Datei ❌');}
  };
  r.readAsText(f);
}

// ── TOAST ──
let tTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.remove('show'),2400);}

// ── OVERLAY CLOSE ──
function closeOv(e,id){if(e.target===e.currentTarget)document.getElementById(id).classList.remove('open');}

// ── VOICE ──
let recog=null,isRec=false,finalT='';
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function initRec(){
  if(!SR)return null;
  const r=new SR();r.lang='de-DE';r.continuous=true;r.interimResults=true;
  r.onstart=()=>{isRec=true;document.getElementById('waveform').classList.remove('idle');document.getElementById('micBtn').classList.add('rec');document.getElementById('vtxt').textContent='Ich höre zu…';};
  r.onresult=e=>{let int='';finalT='';for(let i=0;i<e.results.length;i++){if(e.results[i].isFinal)finalT+=e.results[i][0].transcript;else int+=e.results[i][0].transcript;}document.getElementById('vtxt').textContent=(finalT+int)||'Ich höre zu…';};
  r.onerror=e=>{if(e.error==='not-allowed')document.getElementById('nosup').style.display='block';stopRecUI();};
  r.onend=()=>{if(isRec)try{r.start();}catch(e){}};
  return r;
}
function toggleVoice(){if(!SR){document.getElementById('nosup').style.display='block';return;}isRec?stopVoice():startVoice();}
function startVoice(){finalT='';recog=initRec();if(!recog)return;document.getElementById('voiceOv').classList.add('open');document.getElementById('vtxt').textContent='Warte…';try{recog.start();}catch(e){}}
function stopVoice(){isRec=false;if(recog){recog.stop();recog=null;}stopRecUI();const t=finalT.trim();if(t){const ta=document.getElementById('newText');ta.value=(ta.value?ta.value+' ':'')+t;}document.getElementById('voiceOv').classList.remove('open');}
function cancelVoice(){isRec=false;if(recog){recog.stop();recog=null;}stopRecUI();document.getElementById('voiceOv').classList.remove('open');}
function stopRecUI(){isRec=false;document.getElementById('waveform').classList.add('idle');document.getElementById('micBtn').classList.remove('rec');}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.overlay').forEach(m=>m.classList.remove('open'));document.getElementById('randOv').classList.remove('open');cancelVoice();}});

// ── INIT ──
renderIdeas();
</script>
</body>
</html>
